<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Recall Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f1f5f9;
            --text: #0f172a;
            --card: #ffffff;
            --success: #22c55e;
            --error: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }
        #game-container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: fit-content;
        }
        .hidden { display: none !important; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h2 { margin: 0; font-size: 1.25rem; font-weight: 800; color: var(--primary); }
        
        .settings-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .settings-row:last-child { margin-bottom: 0; }
        select {
            padding: 5px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        .word-display {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin: 30px 0;
            line-height: 1.6;
            background: #eef2ff;
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed var(--primary);
        }
        .timer-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
        }

        #input-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-wrapper {
            position: relative;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); }
        input.correct { border-color: var(--success); background-color: #f0fdf4; }
        input.wrong { border-color: var(--error); background-color: #fef2f2; }

        .feedback-label {
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 4px;
            display: block;
        }
        .text-success { color: var(--success); }
        .text-error { color: var(--error); }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-giveup { background: #fee2e2; color: #b91c1c; margin-top: 15px; }

        #leaderboard {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #f1f5f9;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid #f8fafc;
        }
        .score-val { font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <h2>WORD RECALL</h2>
        <div id="score-tally" style="font-size: 0.8rem; font-weight: 600;">Total Pts: 0</div>
    </header>
    
    <div id="start-screen">
        <div class="settings-box">
            <div class="settings-row">
                <span>Number of words:</span>
                <select id="setting-count">
                    <option value="3">3 Words</option>
                    <option value="4">4 Words</option>
                    <option value="5">5 Words</option>
                    <option value="6">6 Words</option>
                </select>
            </div>
            <div class="settings-row">
                <span>Time to memorize:</span>
                <select id="setting-time">
                    <option value="3">3 Seconds</option>
                    <option value="5" selected>5 Seconds</option>
                    <option value="8">8 Seconds</option>
                    <option value="12">12 Seconds</option>
                </select>
            </div>
        </div>
        <button class="btn-primary" id="main-action-btn" onclick="startGame()">START ROUND</button>
    </div>

    <!-- Phase 1: Memorize -->
    <div id="memorize-phase" class="hidden">
        <div class="timer-circle" id="timer-display">5</div>
        <div class="word-display" id="word-list-ui"></div>
        <p style="text-align:center; font-size: 0.8rem; color: #64748b;">Memorize now...</p>
    </div>

    <!-- Phase 2: Recall -->
    <div id="recall-phase" class="hidden">
        <div id="input-grid"></div>
        <div id="recall-actions">
            <button class="btn-primary" id="submit-btn" onclick="checkAnswers()">SUBMIT ANSWERS</button>
            <button class="btn-outline" id="hint-btn" onclick="showHint()">USE HINT</button>
            <button class="btn-giveup" id="giveup-btn" onclick="giveUp()">GIVE UP</button>
        </div>
        <!-- Result screen actions -->
        <button class="btn-primary hidden" id="next-btn" onclick="resetToStart()">NEXT ROUND</button>
    </div>

    <div id="leaderboard">
        <div style="font-weight: 800; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px;">Recent Rounds</div>
        <div id="score-list"></div>
    </div>
</div>

<script>
    const wordBank = ["Silver", "Jaguar", "Horizon", "Nebula", "Coffee", "Pencil", "Travel", "Museum", "Diamond", "Forest", "Bridge", "Planet", "Rocket", "Canvas", "Guitar", "Marble", "Falcon", "Summer", "Window", "Dragon", "Castle", "Ocean", "Spirit", "Mirror", "Hammer", "Island", "Bottle", "Pocket", "Garden", "Winter", "Anchor", "Breeze", "Cactus", "Desert", "Eagle", "Flame", "Glacier", "Honey", "Indigo", "Jungle"];
    
    let usedWords = new Set();
    let currentWords = [];
    let totalScore = 0;
    let config = { count: 3, time: 5 };
    let isReviewing = false;

    function startGame() {
        config.count = parseInt(document.getElementById('setting-count').value);
        config.time = parseInt(document.getElementById('setting-time').value);
        isReviewing = false;

        if (wordBank.length - usedWords.size < config.count) {
            usedWords.clear();
        }

        currentWords = [];
        let available = wordBank.filter(w => !usedWords.has(w));
        for(let i = 0; i < config.count; i++) {
            let idx = Math.floor(Math.random() * available.length);
            let word = available.splice(idx, 1)[0];
            currentWords.push(word);
        }

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('recall-phase').classList.add('hidden');
        document.getElementById('memorize-phase').classList.remove('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('recall-actions').classList.remove('hidden');
        
        document.getElementById('word-list-ui').innerHTML = currentWords.join("<br>");
        
        startTimer(config.time);
    }

    function startTimer(seconds) {
        let timeLeft = seconds;
        const display = document.getElementById('timer-display');
        display.innerText = timeLeft;
        
        const countdown = setInterval(() => {
            timeLeft--;
            display.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                showRecallPhase();
            }
        }, 1000);
    }

    function showRecallPhase() {
        const grid = document.getElementById('input-grid');
        grid.innerHTML = '';
        currentWords.forEach((_, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'input-wrapper';
            
            const input = document.createElement('input');
            input.type = 'text';
            input.id = `ans${i}`;
            input.placeholder = `Word ${i+1}`;
            input.autocomplete = 'off';
            input.autocapitalize = 'none';
            
            const feedback = document.createElement('span');
            feedback.id = `feedback${i}`;
            feedback.className = 'feedback-label hidden';
            
            wrapper.appendChild(input);
            wrapper.appendChild(feedback);
            grid.appendChild(wrapper);
        });

        document.getElementById('memorize-phase').classList.add('hidden');
        document.getElementById('recall-phase').classList.remove('hidden');
        document.getElementById('ans0').focus();
    }

    function checkAnswers() {
        let correctCount = 0;
        isReviewing = true;

        currentWords.forEach((word, i) => {
            const input = document.getElementById(`ans${i}`);
            const feedback = document.getElementById(`feedback${i}`);
            let userVal = input.value.trim().toLowerCase();
            
            input.disabled = true;
            feedback.classList.remove('hidden');

            if (userVal === word.toLowerCase()) {
                correctCount++;
                usedWords.add(word);
                input.classList.add('correct');
                feedback.innerText = "✓ Correct";
                feedback.className = "feedback-label text-success";
            } else {
                input.classList.add('wrong');
                feedback.innerText = `✗ Should be: ${word}`;
                feedback.className = "feedback-label text-error";
            }
        });

        totalScore += correctCount;
        updateTotalUI();
        saveRound(correctCount, config.count);
        
        // Update Buttons for review mode
        document.getElementById('recall-actions').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function showHint() {
        currentWords.forEach((word, i) => {
            const input = document.getElementById(`ans${i}`);
            if (!input.value) {
                input.value = word[0].toUpperCase() + "...";
                input.style.color = "#6366f1";
            }
        });
        // Hint penalty could be added here if desired
    }

    function giveUp() {
        currentWords.forEach((word, i) => {
            const input = document.getElementById(`ans${i}`);
            const feedback = document.getElementById(`feedback${i}`);
            input.disabled = true;
            input.classList.add('wrong');
            feedback.classList.remove('hidden');
            feedback.innerText = `Word: ${word}`;
            feedback.className = "feedback-label text-error";
        });
        
        saveRound(0, config.count);
        document.getElementById('recall-actions').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function resetToStart() {
        document.getElementById('recall-phase').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }

    function updateTotalUI() {
        document.getElementById('score-tally').innerText = `Total Pts: ${totalScore}`;
    }

    function saveRound(pts, total) {
        const history = JSON.parse(localStorage.getItem('recallHistory') || "[]");
        history.unshift({ 
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
            score: pts, 
            max: total 
        });
        localStorage.setItem('recallHistory', JSON.stringify(history.slice(0, 8)));
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('recallHistory') || "[]");
        const list = document.getElementById('score-list');
        list.innerHTML = history.map(h => `
            <div class="score-item">
                <span>Round at ${h.time}</span>
                <span class="score-val">${h.score}/${h.max}</span>
            </div>
        `).join('');
    }

    renderHistory();
</script>

</body>
</html>
