<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Recall Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f1f5f9;
            --text: #0f172a;
            --card: #ffffff;
            --success: #22c55e;
            --error: #ef4444;
            --whatsapp: #25d366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }
        #game-container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            height: fit-content;
        }
        .hidden { display: none !important; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h2 { margin: 0; font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        
        .round-indicator {
            background: #eef2ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .settings-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .settings-row:last-child { margin-bottom: 0; }
        select {
            padding: 5px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        .word-display {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin: 30px 0;
            line-height: 1.6;
            background: #eef2ff;
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed var(--primary);
        }
        .timer-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
        }

        #input-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-wrapper {
            position: relative;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); }
        input.correct { border-color: var(--success); background-color: #f0fdf4; }
        input.wrong { border-color: var(--error); background-color: #fef2f2; }

        .feedback-label {
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 4px;
            display: block;
        }
        .text-success { color: var(--success); }
        .text-error { color: var(--error); }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-giveup { background: #fee2e2; color: #b91c1c; margin-top: 15px; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }

        .set-complete-card {
            text-align: center;
            padding: 10px 0;
        }
        .final-score {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin: 10px 0;
        }

        #leaderboard {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #f1f5f9;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid #f8fafc;
        }
        .score-val { font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <h2>WORD RECALL</h2>
        <div id="round-status" class="round-indicator hidden">Round 1/3</div>
        <div id="score-tally" style="font-size: 0.8rem; font-weight: 600;">Total Pts: 0</div>
    </header>
    
    <div id="start-screen">
        <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">Complete a set of <b>3 rounds</b> to share your final score!</p>
        <div class="settings-box">
            <div class="settings-row">
                <span>Number of words:</span>
                <select id="setting-count">
                    <option value="4" selected>4 Words</option>
                    <option value="5">5 Words</option>
                    <option value="6">6 Words</option>
                    <option value="7">7 Words</option>
                </select>
            </div>
            <div class="settings-row">
                <span>Time to memorize:</span>
                <select id="setting-time">
                    <option value="3">3 Seconds</option>
                    <option value="5" selected>5 Seconds</option>
                    <option value="8">8 Seconds</option>
                    <option value="12">12 Seconds</option>
                </select>
            </div>
        </div>
        <button class="btn-primary" onclick="startNewSet()">START GAME SET</button>
    </div>

    <!-- Phase 1: Memorize -->
    <div id="memorize-phase" class="hidden">
        <div class="timer-circle" id="timer-display">5</div>
        <div class="word-display" id="word-list-ui"></div>
        <p style="text-align:center; font-size: 0.8rem; color: #64748b;">Memorize now...</p>
    </div>

    <!-- Phase 2: Recall -->
    <div id="recall-phase" class="hidden">
        <div id="input-grid"></div>
        <div id="recall-actions">
            <button class="btn-primary" id="submit-btn" onclick="checkAnswers()">SUBMIT ANSWERS</button>
            <button class="btn-outline" id="hint-btn" onclick="showHint()">USE HINT</button>
            <button class="btn-giveup" id="giveup-btn" onclick="giveUp()">GIVE UP</button>
        </div>
        
        <!-- Intermediate result screen -->
        <div id="intermediate-actions" class="hidden">
            <button class="btn-primary" onclick="nextRoundInSet()">NEXT ROUND</button>
        </div>

        <!-- Set completion screen -->
        <div id="set-complete-actions" class="hidden">
            <div class="set-complete-card">
                <div style="font-size: 0.9rem; font-weight: 600; color: #64748b;">SET COMPLETE</div>
                <div class="final-score" id="final-set-score">0/12</div>
            </div>
            <button class="btn-whatsapp" onclick="shareOnWhatsApp()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                SHARE SET RESULTS
            </button>
            <button class="btn-primary" onclick="resetToHome()">BACK TO START</button>
        </div>
    </div>

    <div id="leaderboard">
        <div style="font-weight: 800; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px;">Recent Sets</div>
        <div id="score-list"></div>
    </div>
</div>

<script>
    const wordBank = ["Silver", "Jaguar", "Horizon", "Nebula", "Coffee", "Pencil", "Travel", "Museum", "Diamond", "Forest", "Bridge", "Planet", "Rocket", "Canvas", "Guitar", "Marble", "Falcon", "Summer", "Window", "Dragon", "Castle", "Ocean", "Spirit", "Mirror", "Hammer", "Island", "Bottle", "Pocket", "Garden", "Winter", "Anchor", "Breeze", "Cactus", "Desert", "Eagle", "Flame", "Glacier", "Honey", "Indigo", "Jungle", "Summit", "Vessel", "Quartz", "Zodiac", "Meteor", "Galaxy", "Arctic", "Temple", "Statue", "Canyon", "Sphinx", "Wizard"];
    
    let usedWords = new Set();
    let currentWords = [];
    let totalSessionScore = 0;
    let config = { count: 4, time: 5 };
    
    let currentRoundInSet = 0;
    let setScore = 0;
    const MAX_ROUNDS_PER_SET = 3;

    function startNewSet() {
        currentRoundInSet = 0;
        setScore = 0;
        config.count = parseInt(document.getElementById('setting-count').value);
        config.time = parseInt(document.getElementById('setting-time').value);
        document.getElementById('round-status').classList.remove('hidden');
        nextRoundInSet();
    }

    function nextRoundInSet() {
        currentRoundInSet++;
        updateRoundStatus();
        
        if (wordBank.length - usedWords.size < config.count) usedWords.clear();

        currentWords = [];
        let available = wordBank.filter(w => !usedWords.has(w));
        for(let i = 0; i < config.count; i++) {
            let idx = Math.floor(Math.random() * available.length);
            let word = available.splice(idx, 1)[0];
            currentWords.push(word);
        }

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('recall-phase').classList.add('hidden');
        document.getElementById('memorize-phase').classList.remove('hidden');
        document.getElementById('intermediate-actions').classList.add('hidden');
        document.getElementById('set-complete-actions').classList.add('hidden');
        document.getElementById('recall-actions').classList.remove('hidden');
        
        document.getElementById('word-list-ui').innerHTML = currentWords.join("<br>");
        startTimer(config.time);
    }

    function startTimer(seconds) {
        let timeLeft = seconds;
        const display = document.getElementById('timer-display');
        display.innerText = timeLeft;
        const countdown = setInterval(() => {
            timeLeft--;
            display.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                showRecallPhase();
            }
        }, 1000);
    }

    function showRecallPhase() {
        const grid = document.getElementById('input-grid');
        grid.innerHTML = '';
        currentWords.forEach((_, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'input-wrapper';
            const input = document.createElement('input');
            input.type = 'text';
            input.id = `ans${i}`;
            input.placeholder = `Word ${i+1}`;
            input.autocomplete = 'off';
            input.autocapitalize = 'none';
            const feedback = document.createElement('span');
            feedback.id = `feedback${i}`;
            feedback.className = 'feedback-label hidden';
            wrapper.appendChild(input);
            wrapper.appendChild(feedback);
            grid.appendChild(wrapper);
        });
        document.getElementById('memorize-phase').classList.add('hidden');
        document.getElementById('recall-phase').classList.remove('hidden');
        document.getElementById('ans0').focus();
    }

    function checkAnswers() {
        let roundCorrect = 0;
        currentWords.forEach((word, i) => {
            const input = document.getElementById(`ans${i}`);
            const feedback = document.getElementById(`feedback${i}`);
            let userVal = input.value.trim().toLowerCase();
            input.disabled = true;
            feedback.classList.remove('hidden');
            if (userVal === word.toLowerCase()) {
                roundCorrect++;
                usedWords.add(word);
                input.classList.add('correct');
                feedback.innerText = "✓ Correct";
                feedback.className = "feedback-label text-success";
            } else {
                input.classList.add('wrong');
                feedback.innerText = `✗ Should be: ${word}`;
                feedback.className = "feedback-label text-error";
            }
        });

        setScore += roundCorrect;
        totalSessionScore += roundCorrect;
        updateTotalUI();
        
        document.getElementById('recall-actions').classList.add('hidden');
        
        if (currentRoundInSet < MAX_ROUNDS_PER_SET) {
            document.getElementById('intermediate-actions').classList.remove('hidden');
        } else {
            finishSet();
        }
    }

    function finishSet() {
        const totalPossible = MAX_ROUNDS_PER_SET * config.count;
        document.getElementById('final-set-score').innerText = `${setScore}/${totalPossible}`;
        document.getElementById('set-complete-actions').classList.remove('hidden');
        saveSetToHistory(setScore, totalPossible);
    }

    function shareOnWhatsApp() {
        const dateStr = new Date().toLocaleDateString();
        const totalPossible = MAX_ROUNDS_PER_SET * config.count;
        const performance = (setScore / totalPossible);
        let emoji = "🧠";
        if (performance === 1) emoji = "👑🔥";
        else if (performance >= 0.7) emoji = "💎";
        
        const text = `Word Recall Pro - Set Results (${dateStr})\n\nFinal Score: ${setScore}/${totalPossible} ${emoji}\nDifficulty: ${config.count} words x 3 rounds\nTimer: ${config.time}s per round\n\nThink you can beat me? 🎮`;
        const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
    }

    function showHint() {
        currentWords.forEach((word, i) => {
            const input = document.getElementById(`ans${i}`);
            if (!input.value) {
                input.value = word[0].toUpperCase() + "...";
                input.style.color = "#6366f1";
            }
        });
    }

    function giveUp() {
        currentWords.forEach((word, i) => {
            const input = document.getElementById(`ans${i}`);
            const feedback = document.getElementById(`feedback${i}`);
            input.disabled = true;
            input.classList.add('wrong');
            feedback.classList.remove('hidden');
            feedback.innerText = `Word: ${word}`;
            feedback.className = "feedback-label text-error";
        });
        document.getElementById('recall-actions').classList.add('hidden');
        if (currentRoundInSet < MAX_ROUNDS_PER_SET) {
            document.getElementById('intermediate-actions').classList.remove('hidden');
        } else {
            finishSet();
        }
    }

    function resetToHome() {
        document.getElementById('recall-phase').classList.add('hidden');
        document.getElementById('round-status').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }

    function updateRoundStatus() {
        document.getElementById('round-status').innerText = `Round ${currentRoundInSet}/${MAX_ROUNDS_PER_SET}`;
    }

    function updateTotalUI() {
        document.getElementById('score-tally').innerText = `Total Pts: ${totalSessionScore}`;
    }

    function saveSetToHistory(pts, total) {
        const history = JSON.parse(localStorage.getItem('setHistory') || "[]");
        history.unshift({ 
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
            score: pts, 
            max: total,
            date: new Date().toLocaleDateString()
        });
        localStorage.setItem('setHistory', JSON.stringify(history.slice(0, 5)));
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('setHistory') || "[]");
        const list = document.getElementById('score-list');
        list.innerHTML = history.map(h => `
            <div class="score-item">
                <span>${h.date} (${h.time})</span>
                <span class="score-val">${h.score}/${h.max}</span>
            </div>
        `).join('');
    }

    renderHistory();
</script>

</body>
</html>
