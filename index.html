<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordRecall Mini (4 Words)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #f8fafc; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .word-chip { background: #eef2ff; color: #4338ca; border: 2px solid #c7d2fe; }
        .btn-action { transition: transform 0.1s; touch-action: manipulation; }
        .btn-action:active { transform: scale(0.96); }
        input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
        
        /* Dynamic Input States */
        .input-correct { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46; }
        .input-wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b; }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="p-2">

    <div id="main-card" class="w-full max-w-[320px] bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <!-- Header -->
        <div class="bg-indigo-600 p-3 text-white flex justify-between items-center">
            <h1 class="font-bold text-lg">WordRecall</h1>
            <div class="flex gap-2">
                <div class="text-[10px] font-mono bg-indigo-500 px-2 py-1 rounded">
                    Round: <span id="stat-round">1</span>/3
                </div>
                <div class="text-[10px] font-mono bg-indigo-500 px-2 py-1 rounded">
                    Score: <span id="stat-streak">0</span>
                </div>
            </div>
        </div>

        <div class="p-4">
            <!-- View: Study -->
            <div id="view-study" class="space-y-4">
                <div id="word-container" class="grid grid-cols-2 gap-2 min-h-[140px] flex items-center">
                    <div class="col-span-2 text-center text-gray-400 italic text-sm py-8 border-2 border-dashed rounded-xl w-full">
                        Tap Generate
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="generate()" class="btn-action bg-gray-100 text-gray-700 font-bold py-3 rounded-xl text-sm border-b-4 border-gray-300">
                        GENERATE
                    </button>
                    <button id="btn-ready" onclick="goTest()" disabled class="btn-action bg-indigo-600 text-white font-bold py-3 rounded-xl text-sm border-b-4 border-indigo-800 opacity-30">
                        TEST ME
                    </button>
                </div>
            </div>

            <!-- View: Test -->
            <div id="view-test" class="hidden space-y-3">
                <div class="grid grid-cols-1 gap-2">
                    <input type="text" id="in-0" placeholder="Word 1" class="w-full p-2.5 bg-gray-50 border-2 border-gray-200 rounded-xl text-center font-bold transition-all duration-200">
                    <input type="text" id="in-1" placeholder="Word 2" class="w-full p-2.5 bg-gray-50 border-2 border-gray-200 rounded-xl text-center font-bold transition-all duration-200">
                    <input type="text" id="in-2" placeholder="Word 3" class="w-full p-2.5 bg-gray-50 border-2 border-gray-200 rounded-xl text-center font-bold transition-all duration-200">
                    <input type="text" id="in-3" placeholder="Word 4" class="w-full p-2.5 bg-gray-50 border-2 border-gray-200 rounded-xl text-center font-bold transition-all duration-200">
                </div>
                
                <div class="flex flex-col gap-2">
                    <button onclick="check()" class="btn-action w-full bg-emerald-500 text-white font-black py-4 rounded-xl shadow-lg border-b-4 border-emerald-700">
                        CHECK ANSWERS
                    </button>
                    <button id="btn-hint" onclick="giveHint()" class="hidden btn-action w-full bg-amber-100 text-amber-700 font-bold py-2 rounded-lg text-xs border border-amber-200">
                        💡 NEED A HINT?
                    </button>
                </div>
            </div>

            <!-- View: Round Success -->
            <div id="view-success" class="hidden text-center py-4 space-y-4">
                <div class="text-5xl">✅</div>
                <h2 class="text-xl font-bold text-emerald-600">Round Complete!</h2>
                <button onclick="nextRound()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">Next Round</button>
            </div>

            <!-- View: Final Results -->
            <div id="view-final" class="hidden text-center py-4 space-y-4">
                <div class="text-5xl">🏆</div>
                <h2 class="text-xl font-bold text-indigo-600">Game Over!</h2>
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <p class="text-gray-500 text-sm uppercase font-bold tracking-widest">Final Score</p>
                    <p class="text-4xl font-black text-gray-800"><span id="final-score">0</span>/3</p>
                </div>
                
                <div class="space-y-2 pt-2">
                    <button onclick="shareToWhatsapp()" class="w-full bg-[#25D366] text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 shadow-md">
                        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.319 1.592 5.548 0 10.058-4.51 10.06-10.059.002-2.689-1.047-5.215-2.951-7.121-1.905-1.906-4.432-2.956-7.123-2.956-5.549 0-10.059 4.511-10.061 10.06-.001 2.032.547 3.513 1.574 5.228l-1.017 3.705 3.832-1.006zm10.968-7.41c-.3-.15-1.771-.874-2.046-.974-.275-.101-.475-.15-.675.15-.2.301-.774.974-.949 1.174-.175.2-.35.225-.65.075-.3-.15-1.265-.467-2.41-1.485-.89-.793-1.49-1.773-1.665-2.074-.175-.3-.019-.461.13-.611.135-.134.3-.351.45-.526.15-.175.2-.301.3-.501.1-.2.05-.375-.025-.526-.075-.15-.675-1.626-.925-2.227-.244-.588-.492-.508-.675-.517-.175-.008-.375-.01-.575-.01s-.525.075-.8.376c-.275.301-1.05 1.026-1.05 2.504 0 1.478 1.075 2.906 1.225 3.106.15.2 2.115 3.23 5.124 4.527.715.309 1.273.494 1.708.633.718.227 1.371.195 1.887.118.574-.085 1.771-.724 2.021-1.426.25-.702.25-1.303.175-1.426-.075-.124-.275-.199-.575-.349z"/></svg>
                        Share Result
                    </button>
                    <button onclick="fullReset()" class="w-full bg-gray-100 text-gray-600 font-bold py-3 rounded-xl text-sm">
                        Play Again
                    </button>
                </div>
            </div>
        </div>

        <!-- Mini Footer -->
        <div id="msg" class="h-8 bg-gray-50 text-[10px] flex items-center justify-center uppercase tracking-widest text-gray-400 font-bold border-t border-gray-100">
            Ready to play?
        </div>
    </div>

    <script>
        const words = ["Apple", "Book", "Desk", "Cat", "Sun", "Moon", "Bread", "Door", "Lamp", "Pen", "Bird", "Tree", "Fish", "Blue", "Gold", "Key", "Milk", "Rain", "Star", "Cake", "Hat", "Ring", "Ball", "Cloud", "Leaf", "Fire", "Snow", "Wind", "Road", "Boat", "Frog", "Shoe", "Cup", "Box"];
        let target = [];
        let score = 0;
        let currentRound = 1;
        const totalRounds = 3;
        const wordsPerRound = 4;

        function setMsg(txt, color='text-gray-400') {
            const m = document.getElementById('msg');
            m.innerText = txt;
            m.className = `h-8 bg-gray-50 text-[10px] flex items-center justify-center uppercase tracking-widest font-bold border-t border-gray-100 ${color}`;
        }

        function generate() {
            target = [...words].sort(() => 0.5 - Math.random()).slice(0, wordsPerRound);
            const container = document.getElementById('word-container');
            container.innerHTML = target.map(w => `
                <div class="word-chip py-3 px-1 rounded-xl text-center text-lg font-black uppercase tracking-tight shadow-sm">
                    ${w}
                </div>
            `).join('');
            
            const btn = document.getElementById('btn-ready');
            btn.disabled = false;
            btn.classList.remove('opacity-30');
            document.getElementById('btn-hint').classList.add('hidden');
            setMsg(`Round ${currentRound}: Memorize!`);
        }

        function goTest() {
            document.getElementById('view-study').classList.add('hidden');
            document.getElementById('view-test').classList.remove('hidden');
            document.getElementById('in-0').focus();
            setMsg("Enter the 4 words");
        }

        function check() {
            const inputs = [
                document.getElementById('in-0'),
                document.getElementById('in-1'),
                document.getElementById('in-2'),
                document.getElementById('in-3')
            ];
            
            const correctWords = target.map(w => w.toLowerCase());
            let allRight = true;

            inputs.forEach((input, idx) => {
                const val = input.value.trim().toLowerCase();
                if (val === correctWords[idx]) {
                    input.classList.remove('input-wrong');
                    input.classList.add('input-correct');
                } else {
                    input.classList.remove('input-correct');
                    input.classList.add('input-wrong');
                    allRight = false;
                }
            });

            if (allRight) {
                score++;
                document.getElementById('stat-streak').innerText = score;
                document.getElementById('view-test').classList.add('hidden');
                
                if (currentRound >= totalRounds) {
                    showFinalResults();
                } else {
                    document.getElementById('view-success').classList.remove('hidden');
                    setMsg("Round passed!", "text-emerald-600");
                }
            } else {
                setMsg("Fix the red boxes!", "text-red-500");
                document.getElementById('main-card').classList.add('shake');
                setTimeout(() => document.getElementById('main-card').classList.remove('shake'), 400);
                document.getElementById('btn-hint').classList.remove('hidden');
            }
        }

        function giveHint() {
            target.forEach((word, idx) => {
                const input = document.getElementById(`in-${idx}`);
                if (!input.value || input.classList.contains('input-wrong')) {
                    input.placeholder = `Starts with "${word[0].toUpperCase()}"...`;
                }
            });
            setMsg("Hints added!", "text-amber-600");
        }

        function nextRound() {
            currentRound++;
            document.getElementById('stat-round').innerText = currentRound;
            document.getElementById('view-success').classList.add('hidden');
            resetTestInputs();
            document.getElementById('view-study').classList.remove('hidden');
            generate();
        }

        function showFinalResults() {
            document.getElementById('final-score').innerText = score;
            document.getElementById('view-test').classList.add('hidden');
            document.getElementById('view-success').classList.add('hidden');
            document.getElementById('view-final').classList.remove('hidden');
            setMsg("Game Finished!", "text-indigo-600");
        }

        function resetTestInputs() {
            const inputs = document.querySelectorAll('#view-test input');
            inputs.forEach(i => {
                i.value = '';
                const idx = parseInt(i.id.split('-')[1]) + 1;
                i.placeholder = `Word ${idx}`;
                i.classList.remove('input-correct', 'input-wrong');
            });
        }

        function fullReset() {
            score = 0;
            currentRound = 1;
            document.getElementById('stat-streak').innerText = score;
            document.getElementById('stat-round').innerText = currentRound;
            document.getElementById('view-final').classList.add('hidden');
            document.getElementById('view-study').classList.remove('hidden');
            resetTestInputs();
            generate();
        }

        function shareToWhatsapp() {
            const date = new Date().toLocaleDateString();
            const text = `🧠 WordRecall Result (${date})\n\nChallenge: 4 words per round\nScore: ${score}/${totalRounds} perfect!\n\nCan you beat my memory?`;
            const url = `whatsapp://send?text=${encodeURIComponent(text)}`;
            window.location.href = url;
            
            setTimeout(() => {
                const webUrl = `https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`;
                window.open(webUrl, '_blank');
            }, 100);
        }

        window.onload = () => {
            setMsg("Ready to play?");
        };
    </script>
</body>
</html>
